    const songs = [

        '一亿个伤心-蒙面哥', 
        '一无所有的年纪-侯泽润', 
        '万有引力-汪苏泷', 
        '人间半途-刘阳阳', 
        '人间烟火-程响', 
        '伤心剖半-邓典', 
        '伤心太平洋-任贤齐', 
        '你别慌余生还长-任夏', 
        '假如我不再善良-郑畅业', 
        '冲动的惩罚-刀郎', 
        '凡夫俗子-范茹', 
        '别说我的眼泪你无所谓-东来东往', 
        '可能-程响', 
        '听-张杰', 
        '喀什噶尔胡杨-刀郎', 
        '因为爱所以爱-谢霆锋', 
        '土坡上的狗尾草-卢润泽', 
        '多想做个哑巴-侯泽润', 
        '失恋阵线联盟-草蜢', 
        '妈妈我想回家-曾抖抖', 
        '小模样-张冬玲', 
        '年少的你啊-浩然H.R', 
        '归途的光-诺爷Plus', 
        '心态才是你风水-艺凌', 
        '我也不想活得太累-郑畅业', 
        '我真怕自己哪天倒下-张良', 
        '手心里的温柔-刀郎', 
        '换个方向风景会更好看-杨一琪', 
        '放手也是一种成全-郑畅业', 
        '星星点灯-大波浪', 
        '星河万里-Rom邢锐', 
        '有点甜-汪苏泷.BY2', 
        '望故乡-刘阳阳', 
        '海边探戈-王鹤棣', 
        '火力全开-王力宏', 
        '生活没有说明书-洛什么洛', 
        '破碎的梦-陈柏曦', 
        '秋风经过-任夏', 
        '第51次原谅-刘艺雯', 
        '老人与海-汪苏泷.王心凌', 
        '胡广生-任素汐', 
        '苹果香-狼戈', 
        '西楼儿女-岳云鹏', 
        '谁明浪子心-王杰', 
        '路灯下点烟时没有打火机-王永清', 
        '过了河就拆桥-成学迅', 
        '野狼disco-宝石Gem', 
        '除了生死都是擦伤-侯泽润', 
    ];
    let audios = [];
    
    songs.forEach((item) => {
        const songInfo = item.split('-');
        audios.push({
            name: songInfo[0],
            artist: songInfo[1],
            url: home + item + '/song.mp3',
            cover: home + item + '/cover.jpg',
            lrc: home + item + '/lyric.lrc'
        });
    });

    const ap = new APlayer({
        container: document.getElementById('aplayer'),
        fixed: true,
        lrcType: 3,
        audio: audios
    });

    

    window.onbeforeunload = () => {
        
        const playInfo = {
            index: ap.list.index,
            currentTime: ap.audio.currentTime,
            paused: ap.paused
        };
        localStorage.setItem("playInfo", JSON.stringify(playInfo));
    };

    

    window.onload = () => {
        
        const playInfo = JSON.parse(localStorage.getItem("playInfo"));
        if (!playInfo) {
            return;
        }
        
        ap.list.switch(playInfo.index);
        
        setTimeout(() => {
            
            ap.seek(playInfo.currentTime);
            
            if (!playInfo.paused) {
                ap.play()
            }
        }, 500);
    };
</script>

        if (request.responseText.match("<html")) {
            
            let newDom = new DOMParser().parseFromString(responseText, 'text/html');
            
            let bodyClass = newDom.body.className;
            document.body.setAttribute("class", bodyClass)
            
            pjax._handleResponse(responseText, request, href, options);
        } else {
            
        }
    }

    document.addEventListener('pjax:send', () => {
        
        topbar.show();
    })

    document.addEventListener('pjax:complete', () => {
        
        window.Stack.init();
        
        topbar.hide();
    })
</script>
